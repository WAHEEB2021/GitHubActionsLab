name: CI Demo

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Welcome Message
        run: echo "GitHub Actions Works Successfully!"

      - name: Display Current Directory
        run: pwd

      - name: List Project Files
        run: ls -la